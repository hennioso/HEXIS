<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEXIS — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d1117;
      --card:   #161b22;
      --border: #30363d;
      --text:   #e6edf3;
      --muted:  #8b949e;
      --green:  #3fb950;
      --red:    #f85149;
      --accent: #58a6ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .logo h1 {
      display: inline-flex;
      align-items: center;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .logo p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 28px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 15px;
      transition: border-color .15s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .error-box {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.35);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 18px;
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      background: var(--green);
      color: #000;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity .15s;
    }
    .submit-btn:hover { opacity: .85; }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--muted);
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <svg viewBox="0 0 136 136" width="72" height="72" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto 12px">
        <defs>
          <filter id="lglow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <polygon points="68,8 114,34 114,102 68,128 22,102 22,34" fill="none" stroke="#e8e6df" stroke-width="2"/>
        <polygon points="68,30 94,45 94,91 68,106 42,91 42,45" fill="none" stroke="#e8e6df" stroke-width="0.8" opacity="0.2"/>
        <line x1="44" y1="60" x2="44" y2="100" stroke="#e8e6df" stroke-width="1" opacity="0.3"/>
        <rect x="40" y="68" width="9" height="22" fill="none" stroke="#e8e6df" stroke-width="1" opacity="0.45"/>
        <line x1="61" y1="53" x2="61" y2="95" stroke="#e8e6df" stroke-width="1" opacity="0.3"/>
        <rect x="57" y="61" width="9" height="24" fill="none" stroke="#e8e6df" stroke-width="1" opacity="0.45"/>
        <line x1="78" y1="44" x2="78" y2="90" stroke="#3fb950" stroke-width="1" opacity="0.8"/>
        <rect x="74" y="50" width="9" height="28" fill="none" stroke="#3fb950" stroke-width="1.4" opacity="0.95"/>
        <line x1="95" y1="37" x2="95" y2="82" stroke="#3fb950" stroke-width="1" opacity="0.8"/>
        <rect x="91" y="42" width="9" height="30" fill="none" stroke="#3fb950" stroke-width="1.8" opacity="1"/>
        <polyline points="40,68 57,61 74,50 91,42" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.4" stroke-dasharray="2 2"/>
        <g transform="translate(114,34)" filter="url(#lglow)">
          <circle cx="0" cy="0" r="5" fill="none" stroke="#3fb950" stroke-width="1.2" opacity="0.5"/>
          <circle cx="0" cy="0" r="3.5" fill="#3fb950" opacity="0.9"/>
        </g>
      </svg>
      <h1><span class="logo-dot"></span>HEXIS</h1>
      <p>Algorithmic Trading Agent</p>
    </div>

    <div class="card">
      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" autofocus autocomplete="username" placeholder="admin" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button class="submit-btn" type="submit">Sign In</button>
      </form>
    </div>

    <div class="footer">
      <a href="https://www.bitunix.com/register?inviteCode=vefzzy" target="_blank" rel="noopener">
        ▶ Register on Bitunix
      </a>
    </div>
  </div>
</body>
</html>
