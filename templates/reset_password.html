<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEXIS — Reset Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;--accent:#58a6ff; }
    body { background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .wrap { width:100%;max-width:380px;padding:20px; }
    .logo { text-align:center;margin-bottom:32px; }
    .logo h1 { font-size:26px;font-weight:700;letter-spacing:.06em; }
    .logo p { color:var(--muted);font-size:13px;margin-top:6px; }
    .card { background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px; }
    .card h2 { font-size:18px;margin-bottom:8px; }
    .card p { color:var(--muted);font-size:13px;margin-bottom:24px;line-height:1.5; }
    label { display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px; }
    input { width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none; }
    input:focus { border-color:var(--accent); }
    button { width:100%;padding:11px;background:var(--green);color:#000;font-weight:700;font-size:14px;border:none;border-radius:8px;cursor:pointer;margin-top:16px; }
    .error { background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:8px;padding:12px;font-size:13px;color:var(--red);margin-bottom:16px; }
    .back { text-align:center;margin-top:20px;font-size:13px;color:var(--muted); }
    .back a { color:var(--accent);text-decoration:none; }
    .field { margin-bottom:16px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>HEXIS</h1>
    <p>Algorithmic Trading Agent</p>
  </div>
  <div class="card">
    <h2>New Password</h2>
    <p>Choose a new password for your account.</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    {% if not error or error and 'match' in error or error and '8 char' in error %}
    <form method="POST">
      <input type="hidden" name="token" value="{{ token }}" />
      <div class="field">
        <label>New Password</label>
        <input type="password" name="password" required minlength="8" placeholder="Min. 8 characters" />
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" name="confirm" required placeholder="Repeat password" />
      </div>
      <button type="submit">Set New Password</button>
    </form>
    {% endif %}
  </div>
  <div class="back"><a href="/login">← Back to Login</a></div>
</div>
</body>
</html>
